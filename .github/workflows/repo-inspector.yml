name: GITHUB ACTIONS BASICS

on: 
  push:

jobs:
  Inspect:
     runs-on: ubuntu-24.04

     steps:
       - uses: actions/checkout@v4

       - name: print current directory
         run: pwd
       - name: show all files
         run: ls -la
       - name: display the hello file
         run: cat hello.yml
       - name: print today date
         run: date
       - name: disply kernal version
         run: uname -a
